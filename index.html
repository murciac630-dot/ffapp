<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FERCO FARMA · Gestión de Proveedores</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════════════════════════════ */
:root {
  --bg:        #06061A;
  --bg2:       #0B0B28;
  --bg3:       #10103A;
  --card:      rgba(255,255,255,0.04);
  --card2:     rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.14);
  --purple:    #7C3AED;
  --purple2:   #5B21B6;
  --purple3:   #A78BFA;
  --cyan:      #06B6D4;
  --cyan2:     #0891B2;
  --pink:      #DB2777;
  --pink2:     #BE185D;
  --text:      #E2E8F0;
  --text2:     #94A3B8;
  --text3:     #64748B;
  --white:     #FFFFFF;
  --green:     #10B981;
  --red:       #EF4444;
  --yellow:    #F59E0B;
  --grad:      linear-gradient(135deg, var(--purple), var(--cyan));
  --grad-hover:linear-gradient(135deg, var(--purple2), var(--cyan2));
  --font-h:   'Rajdhani', sans-serif;
  --font-b:   'Nunito', sans-serif;
  --shadow:    0 10px 30px rgba(0,0,0,0.5);
  --glass:     blur(12px) saturate(180%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  overflow-x: hidden;
  line-height: 1.5;
}

/* ══════════════════════════════════════════════════════════════
   COMPONENTS & UI
══════════════════════════════════════════════════════════════ */
button, input, select, textarea { font-family: inherit; font-size: 14px; border: none; outline: none; transition: 0.2s; }
button { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; font-weight: 600; }
input, select, textarea { background: var(--bg3); color: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }

h1, h2, h3, h4 { font-family: var(--font-h); text-transform: uppercase; letter-spacing: 1px; color: var(--white); }

.btn { padding: 10px 20px; font-size: 14px; }
.btn-primary { background: var(--grad); color: var(--white); box-shadow: 0 4px 15px rgba(124,58,237,0.3); }
.btn-primary:hover { background: var(--grad-hover); transform: translateY(-2px); }
.btn-ghost { background: var(--card); color: var(--text2); }
.btn-ghost:hover { background: var(--card2); color: var(--white); }
.btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; }

.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
.badge-ok { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-err { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }

/* ══════════════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════════════ */
.login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(circle at top right, var(--bg3), var(--bg));
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
  width: 100%; max-width: 400px;
  background: var(--card); border: 1px solid var(--border2); backdrop-filter: var(--glass);
  padding: 40px; border-radius: 24px; text-align: center;
  box-shadow: var(--shadow);
}
.login-logo { font-size: 32px; font-weight: 800; margin-bottom: 30px; display: block; color: var(--white); }
.login-logo span { color: var(--cyan); }

.main-layout { display: none; min-height: 100vh; }
.sidebar {
  width: 260px; height: 100vh; position: fixed; left: 0; top: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  padding: 24px; z-index: 1000;
}
.content { margin-left: 260px; padding: 40px; }

.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  color: var(--text2); text-decoration: none; border-radius: 12px;
  margin-bottom: 8px; font-weight: 600;
}
.nav-item:hover, .nav-item.active { background: var(--card); color: var(--white); }
.nav-item.active { border-left: 3px solid var(--cyan); }

/* ══════════════════════════════════════════════════════════════
   DASHBOARD & CARDS
══════════════════════════════════════════════════════════════ */
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.stat-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; }
.stat-val { font-size: 28px; font-weight: 700; font-family: var(--font-h); color: var(--white); }

.card-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 24px;
  overflow: hidden; box-shadow: var(--shadow);
}
.card-head { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.card-body { padding: 32px; }

/* ══════════════════════════════════════════════════════════════
   TABLES
══════════════════════════════════════════════════════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th { text-align: left; padding: 16px; font-family: var(--font-h); color: var(--text3); font-size: 13px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ══════════════════════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2); width: 90%; max-width: 500px;
  border-radius: 24px; box-shadow: var(--shadow); transform: scale(0.9); transition: 0.3s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-head { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 32px; display: flex; flex-direction: column; gap: 20px; }
.modal-foot { padding: 24px; display: flex; justify-content: flex-end; gap: 12px; }

.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; }

/* ══════════════════════════════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); transition: 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .content { margin-left: 0; padding: 20px; }
}

/* ══════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; pointer-events: none; }
.toast { transform: translateX(120%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
.toast.show { transform: translateX(0); }
.toast-inner { background: var(--bg3); border-left: 4px solid var(--cyan); padding: 16px 24px; border-radius: 12px; box-shadow: var(--shadow); color: var(--white); font-weight: 600; display: flex; align-items: center; gap: 12px; }
.toast-ok { border-color: var(--green); }
.toast-err { border-color: var(--red); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">FERCO<span>FARMA</span></div>
    <div class="field" style="margin-bottom:20px">
      <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username">
    </div>
    <div class="field" style="margin-bottom:30px">
      <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar al Sistema</button>
  </div>
</div>

<div class="main-layout" id="mainLayout">
  <aside class="sidebar">
    <div class="login-logo" style="font-size:24px; margin-bottom:40px">F<span>F</span></div>
    <nav>
      <a href="#" class="nav-item active" onclick="showSection('dashboard')">📊 Dashboard</a>
      <a href="#" class="nav-item" onclick="showSection('transacciones')">💸 Transacciones</a>
      <a href="#" class="nav-item" onclick="showSection('balance')">🏛️ Balance Total</a>
      <a href="#" class="nav-item" style="margin-top:40px; color:var(--red)" onclick="doLogout()">🚪 Salir</a>
    </nav>
  </aside>

  <main class="content">
    <div id="section-dashboard" class="app-section">
      <header class="top-bar">
        <h1>Dashboard General</h1>
        <button class="btn btn-primary" onclick="openModal('txModal')">➕ Nueva Transacción</button>
      </header>

      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-label">Ingresos del Mes</span>
          <span class="stat-val" id="stat-ingresos">$0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Egresos del Mes</span>
          <span class="stat-val" id="stat-egresos">$0.00</span>
        </div>
        <div class="stat-card" style="border-color: var(--cyan)">
          <span class="stat-label">Balance Neto</span>
          <span class="stat-val" id="stat-neto">$0.00</span>
        </div>
